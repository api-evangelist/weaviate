plans:
  - id: weaviate-free-trial
    name: Free Trial
    type: freemium
    description: Free for 14 days, then pay-as-you-go.
    entries:
      - label: Trial duration
        name: trial
        type: quota
        metric: day
        limit: 14
        timeFrame: one-time
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Fully managed in shared cloud
      - name: Hybrid search, dynamic index, compression
      - name: Multi-tenancy
      - name: RBAC baseline security
      - name: Forum support
  - id: weaviate-flex
    name: Flex
    type: paid
    description: Starts $45/month; pay-as-you-go monthly.
    entries:
      - label: Monthly minimum
        name: monthly_min
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '45.00'
        userMultiplied: false
      - label: Storage per GiB
        name: storage
        type: metered
        metric: GiB
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.255'
        userMultiplied: false
      - label: Backup per GiB
        name: backup
        type: metered
        metric: GiB
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.0264'
        userMultiplied: false
