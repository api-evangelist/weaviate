    - name: weaviate-create-new-user
      description: Weaviate Create A New User
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: weaviate-users.createuser
      with:
        user_id: tools.user_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: weaviate-delete-user
      description: Weaviate Delete A User
      hints:
