naftiko: 1.0.0-alpha2
info:
  label: Weaviate REST API — graphql
  description: 'Weaviate REST API — graphql. 2 operations. Lead operation: Weaviate Perform A GraphQL Query. Self-contained
    Naftiko capability covering one Weaviate business surface.'
  tags:
  - Weaviate
  - graphql
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WEAVIATE_API_KEY: WEAVIATE_API_KEY
capability:
  consumes:
  - type: http
    namespace: weaviate-graphql
    baseUri: http://localhost:8080
    description: Weaviate REST API — graphql business capability. Self-contained, no shared references.
    resources:
    - name: graphql
      path: /graphql
      operations:
      - name: graphqlpost
        method: POST
        description: Weaviate Perform A GraphQL Query
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: graphql-batch
      path: /graphql/batch
      operations:
      - name: graphqlbatch
        method: POST
        description: Weaviate Perform Batched GraphQL Queries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.WEAVIATE_API_KEY}}'
  exposes:
  - type: rest
    namespace: weaviate-graphql-rest
    port: 8080
    description: REST adapter for Weaviate REST API — graphql. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/graphql
      name: graphql
      description: REST surface for graphql.
      operations:
      - method: POST
        name: graphqlpost
        description: Weaviate Perform A GraphQL Query
        call: weaviate-graphql.graphqlpost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/graphql/batch
      name: graphql-batch
      description: REST surface for graphql-batch.
      operations:
      - method: POST
        name: graphqlbatch
        description: Weaviate Perform Batched GraphQL Queries
        call: weaviate-graphql.graphqlbatch
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: weaviate-graphql-mcp
    port: 9090
    transport: http
    description: MCP adapter for Weaviate REST API — graphql. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: weaviate-perform-graphql-query
      description: Weaviate Perform A GraphQL Query
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: weaviate-graphql.graphqlpost
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: weaviate-perform-batched-graphql-queries
      description: Weaviate Perform Batched GraphQL Queries
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: weaviate-graphql.graphqlbatch
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
