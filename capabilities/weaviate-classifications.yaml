naftiko: 1.0.0-alpha2
info:
  label: Weaviate REST API — classifications
  description: 'Weaviate REST API — classifications. 2 operations. Lead operation: Weaviate Start A Classification. Self-contained
    Naftiko capability covering one Weaviate business surface.'
  tags:
  - Weaviate
  - classifications
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WEAVIATE_API_KEY: WEAVIATE_API_KEY
capability:
  consumes:
  - type: http
    namespace: weaviate-classifications
    baseUri: http://localhost:8080
    description: Weaviate REST API — classifications business capability. Self-contained, no shared references.
    resources:
    - name: classifications
      path: /classifications/
      operations:
      - name: classificationspost
        method: POST
        description: Weaviate Start A Classification
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: classifications-id
      path: /classifications/{id}
      operations:
      - name: classificationsget
        method: GET
        description: Weaviate Get Classification Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The unique identifier (UUID) of the classification task.
          required: true
    authentication:
      type: bearer
      token: '{{env.WEAVIATE_API_KEY}}'
  exposes:
  - type: rest
    namespace: weaviate-classifications-rest
    port: 8080
    description: REST adapter for Weaviate REST API — classifications. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/classifications
      name: classifications
      description: REST surface for classifications.
      operations:
      - method: POST
        name: classificationspost
        description: Weaviate Start A Classification
        call: weaviate-classifications.classificationspost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/classifications/{id}
      name: classifications-id
      description: REST surface for classifications-id.
      operations:
      - method: GET
        name: classificationsget
        description: Weaviate Get Classification Status
        call: weaviate-classifications.classificationsget
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: weaviate-classifications-mcp
    port: 9090
    transport: http
    description: MCP adapter for Weaviate REST API — classifications. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: weaviate-start-classification
      description: Weaviate Start A Classification
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: weaviate-classifications.classificationspost
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: weaviate-get-classification-status
      description: Weaviate Get Classification Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: weaviate-classifications.classificationsget
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
