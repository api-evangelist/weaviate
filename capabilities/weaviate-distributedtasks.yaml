naftiko: 1.0.0-alpha2
info:
  label: Weaviate REST API — distributedTasks
  description: 'Weaviate REST API — distributedTasks. 1 operations. Lead operation: Weaviate Lists All Distributed Tasks In
    The Cluster. Self-contained Naftiko capability covering one Weaviate business surface.'
  tags:
  - Weaviate
  - distributedTasks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WEAVIATE_API_KEY: WEAVIATE_API_KEY
capability:
  consumes:
  - type: http
    namespace: weaviate-distributedtasks
    baseUri: http://localhost:8080
    description: Weaviate REST API — distributedTasks business capability. Self-contained, no shared references.
    resources:
    - name: tasks
      path: /tasks
      operations:
      - name: distributedtasksget
        method: GET
        description: Weaviate Lists All Distributed Tasks In The Cluster
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WEAVIATE_API_KEY}}'
  exposes:
  - type: rest
    namespace: weaviate-distributedtasks-rest
    port: 8080
    description: REST adapter for Weaviate REST API — distributedTasks. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/tasks
      name: tasks
      description: REST surface for tasks.
      operations:
      - method: GET
        name: distributedtasksget
        description: Weaviate Lists All Distributed Tasks In The Cluster
        call: weaviate-distributedtasks.distributedtasksget
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: weaviate-distributedtasks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Weaviate REST API — distributedTasks. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: weaviate-lists-all-distributed-tasks
      description: Weaviate Lists All Distributed Tasks In The Cluster
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: weaviate-distributedtasks.distributedtasksget
      outputParameters:
      - type: object
        mapping: $.
