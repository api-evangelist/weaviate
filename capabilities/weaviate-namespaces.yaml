    description: Weaviate REST API — namespaces business capability. Self-contained, no shared references.
    resources:
    - name: namespaces
      path: /namespaces
      operations:
      - name: listnamespaces
        method: GET
        description: Weaviate List Namespaces
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: namespaces-namespace_id
      path: /namespaces/{namespace_id}
      operations:
      - name: createnamespace
        method: POST
        description: Weaviate Create A New Namespace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespace_id
          in: path
          type: string
          description: The name of the namespace. Must start with a lowercase letter, contain only lowercase letters and digits,
            length 3-36, and not be a reserved name.
          required: true
      - name: getnamespace
        method: GET
        description: Weaviate Get A Namespace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespace_id
          in: path
          type: string
          description: The name of the namespace.
          required: true
      - name: deletenamespace
        method: DELETE
        description: Weaviate Delete A Namespace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespace_id
          in: path
          type: string
          description: The name of the namespace.
          required: true
