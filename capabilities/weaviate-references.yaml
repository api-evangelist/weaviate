naftiko: 1.0.0-alpha2
info:
  label: Weaviate REST API — references
  description: 'Weaviate REST API — references. 1 operations. Lead operation: Weaviate Create Cross-References In Bulk. Self-contained
    Naftiko capability covering one Weaviate business surface.'
  tags:
  - Weaviate
  - references
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WEAVIATE_API_KEY: WEAVIATE_API_KEY
capability:
  consumes:
  - type: http
    namespace: weaviate-references
    baseUri: http://localhost:8080
    description: Weaviate REST API — references business capability. Self-contained, no shared references.
    resources:
    - name: batch-references
      path: /batch/references
      operations:
      - name: batchreferencescreate
        method: POST
        description: Weaviate Create Cross-References In Bulk
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: consistency_level
          in: query
          type: string
          description: Determines how many replicas must acknowledge a request before it is considered successful.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.WEAVIATE_API_KEY}}'
  exposes:
  - type: rest
    namespace: weaviate-references-rest
    port: 8080
    description: REST adapter for Weaviate REST API — references. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/batch/references
      name: batch-references
      description: REST surface for batch-references.
      operations:
      - method: POST
        name: batchreferencescreate
        description: Weaviate Create Cross-References In Bulk
        call: weaviate-references.batchreferencescreate
        with:
          consistency_level: rest.consistency_level
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: weaviate-references-mcp
    port: 9090
    transport: http
    description: MCP adapter for Weaviate REST API — references. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: weaviate-create-cross-references-bulk
      description: Weaviate Create Cross-References In Bulk
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: weaviate-references.batchreferencescreate
      with:
        consistency_level: tools.consistency_level
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
