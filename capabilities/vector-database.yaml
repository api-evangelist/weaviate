naftiko: 1.0.0-alpha2
info:
  label: Weaviate Vector Database
  description: Unified vector database workflow for managing Weaviate objects, schemas, vector search via GraphQL, backups,
    and cluster operations. Used by AI engineers, platform operators, and data engineers to build and manage AI-powered applications.
  tags:
  - Vector Database
  - AI
  - Machine Learning
  - Semantic Search
  - Objects
  - Schema
  - GraphQL
  - DevOps
  created: '2026-05-03'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    WEAVIATE_HOST: WEAVIATE_HOST
    WEAVIATE_API_KEY: WEAVIATE_API_KEY
capability:
  consumes:
  - type: http
    namespace: weaviate
    baseUri: http://localhost:8080
    description: Weaviate vector database REST API.
    resources:
    - name: health
      path: /.well-known/ready
      description: Application readiness check
      operations:
      - name: check-readiness
        method: GET
        description: Check if Weaviate is ready to accept requests
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: objects
      path: /objects
      description: Vector object management
      operations:
      - name: list-objects
        method: GET
        description: List objects in Weaviate
        inputParameters:
        - name: class
          in: query
          type: string
          required: false
          description: Filter by collection class name
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of results
        - name: offset
          in: query
          type: integer
          required: false
          description: Offset for pagination
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-object
        method: POST
        description: Create a new object in Weaviate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: object
      path: /objects/{id}
      description: Individual object operations
      operations:
      - name: get-object
        method: GET
        description: Get a specific object by ID
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Object UUID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-object
        method: DELETE
        description: Delete an object by ID
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Object UUID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: graphql
      path: /graphql
      description: GraphQL query interface
      operations:
      - name: graphql-query
        method: POST
        description: Execute a GraphQL query for vector search and data retrieval
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: schema
      path: /schema
      description: Collection schema management
      operations:
      - name: get-schema
        method: GET
        description: Get the current data schema
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-class
        method: POST
        description: Create a new collection class in the schema
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: class-schema
      path: /schema/{className}
      description: Individual class schema operations
      operations:
      - name: get-class
        method: GET
        description: Get a specific class definition
        inputParameters:
        - name: className
          in: path
          type: string
          required: true
          description: Name of the collection class
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-class
        method: DELETE
        description: Delete a class and all its objects
        inputParameters:
        - name: className
          in: path
          type: string
          required: true
          description: Name of the collection class
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: batch-objects
      path: /batch/objects
      description: Batch object operations
      operations:
      - name: batch-create-objects
        method: POST
        description: Create multiple objects in a single batch request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: backups
      path: /backups/{backend}
      description: Backup management
      operations:
      - name: create-backup
        method: POST
        description: Create a backup of Weaviate data
        inputParameters:
        - name: backend
          in: path
          type: string
          required: true
          description: Storage backend (s3, gcs, filesystem, azure)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: list-backups
        method: GET
        description: List available backups
        inputParameters:
        - name: backend
          in: path
          type: string
          required: true
          description: Storage backend
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: nodes
      path: /nodes
      description: Cluster node information
      operations:
      - name: get-nodes
        method: GET
        description: Get information about all nodes in the cluster
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: cluster-statistics
      path: /cluster/statistics
      description: Cluster statistics
      operations:
      - name: get-cluster-statistics
        method: GET
        description: Get cluster-wide statistics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: authz-roles
      path: /authz/roles
      description: Authorization role management
      operations:
      - name: list-roles
        method: GET
        description: List all authorization roles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-role
        method: POST
        description: Create a new authorization role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8083
    namespace: vector-database-api
    description: Unified REST API for Weaviate vector database management.
    resources:
    - path: /v1/health
      name: health
      description: Application health
      operations:
      - method: GET
        name: check-readiness
        description: Check if Weaviate is ready
        call: weaviate.check-readiness
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/objects
      name: objects
      description: Vector object management
      operations:
      - method: GET
        name: list-objects
        description: List objects in Weaviate
        call: weaviate.list-objects
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-object
        description: Create a new object
        call: weaviate.create-object
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/objects/{id}
      name: object
      description: Individual object operations
      operations:
      - method: GET
        name: get-object
        description: Get an object by ID
        call: weaviate.get-object
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-object
        description: Delete an object
        call: weaviate.delete-object
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/graphql
      name: graphql
      description: GraphQL vector search
      operations:
      - method: POST
        name: graphql-query
        description: Execute GraphQL vector search query
        call: weaviate.graphql-query
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/schema
      name: schema
      description: Schema management
      operations:
      - method: GET
        name: get-schema
        description: Get data schema
        call: weaviate.get-schema
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-class
        description: Create a collection class
        call: weaviate.create-class
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/batch/objects
      name: batch-objects
      description: Batch object operations
      operations:
      - method: POST
        name: batch-create-objects
        description: Batch create objects
        call: weaviate.batch-create-objects
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/nodes
      name: nodes
      description: Cluster nodes
      operations:
      - method: GET
        name: get-nodes
        description: Get cluster node information
        call: weaviate.get-nodes
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9093
    namespace: vector-database-mcp
    transport: http
    description: MCP server for AI-assisted Weaviate vector database management.
    tools:
    - name: check-weaviate-readiness
      description: Check if the Weaviate instance is ready to accept requests
      hints:
        readOnly: true
        openWorld: false
      call: weaviate.check-readiness
      outputParameters:
      - type: object
        mapping: $.
    - name: list-weaviate-objects
      description: List objects stored in Weaviate, optionally filtered by collection class
      hints:
        readOnly: true
        openWorld: false
      call: weaviate.list-objects
      outputParameters:
      - type: object
        mapping: $.
    - name: create-weaviate-object
      description: Create a new vector object in Weaviate with optional vector embedding
      hints:
        readOnly: false
        idempotent: false
      call: weaviate.create-object
      outputParameters:
      - type: object
        mapping: $.
    - name: get-weaviate-object
      description: Retrieve a specific Weaviate object by its UUID
      hints:
        readOnly: true
        openWorld: false
      call: weaviate.get-object
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-weaviate-object
      description: Delete a Weaviate object by UUID
      hints:
        readOnly: false
        destructive: true
      call: weaviate.delete-object
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: vector-search
      description: Execute a GraphQL vector similarity search query against Weaviate
      hints:
        readOnly: true
        openWorld: true
      call: weaviate.graphql-query
      outputParameters:
      - type: object
        mapping: $.
    - name: get-schema
      description: Get the current data schema including all collection classes
      hints:
        readOnly: true
        openWorld: false
      call: weaviate.get-schema
      outputParameters:
      - type: object
        mapping: $.
    - name: create-collection-class
      description: Create a new collection class in the Weaviate schema
      hints:
        readOnly: false
        idempotent: false
      call: weaviate.create-class
      outputParameters:
      - type: object
        mapping: $.
    - name: batch-import-objects
      description: Import multiple objects to Weaviate in a single batch operation
      hints:
        readOnly: false
        idempotent: false
      call: weaviate.batch-create-objects
      outputParameters:
      - type: object
        mapping: $.
    - name: get-cluster-nodes
      description: Get information about all nodes in the Weaviate cluster
      hints:
        readOnly: true
        openWorld: false
      call: weaviate.get-nodes
      outputParameters:
      - type: object
        mapping: $.
    - name: create-backup
      description: Create a backup of Weaviate data to a storage backend (s3, gcs, filesystem, azure)
      hints:
        readOnly: false
        idempotent: false
      call: weaviate.create-backup
      with:
        backend: tools.backend
      outputParameters:
      - type: object
        mapping: $.
    - name: list-backups
      description: List available backups on a storage backend
      hints:
        readOnly: true
        openWorld: false
      call: weaviate.list-backups
      with:
        backend: tools.backend
      outputParameters:
      - type: object
        mapping: $.
