        description: Weaviate Initiate A Replica Movement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deleteallreplications
        method: DELETE
        description: Weaviate Delete All Replication Operations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
