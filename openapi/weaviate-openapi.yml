          format: int64
          description: overall neighbors checked as part of the classification. In
            most cases this will equal k, but could be lower than k - for example
            if not enough data was present
        winningCount:
          type: number
          format: int64
          description: size of the winning group, a number between 1..k
        losingCount:
          type: number
          format: int64
          description: size of the losing group, can be 0 if the winning group size
            equals k
        closestOverallDistance:
          type: number
          format: float32
          description: The lowest distance of any neighbor, regardless of whether
            they were in the winning or losing group
        winningDistance:
          type: number
          format: float32
          description: deprecated - do not use, to be removed in 0.23.0
        meanWinningDistance:
          type: number
          format: float32
          description: Mean distance of all neighbors from the winning group
        closestWinningDistance:
          type: number
          format: float32
          description: Closest distance of a neighbor from the winning group
        closestLosingDistance:
          type: number
          format: float32
          description: The lowest distance of a neighbor in the losing group. Optional.
            If k equals the size of the winning group, there is no losing group
        losingDistance:
          type: number
          format: float32
          description: deprecated - do not use, to be removed in 0.23.0
        meanLosingDistance:
          type: number
          format: float32
          description: Mean distance of all neighbors from the losing group. Optional.
            If k equals the size of the winning group, there is no losing group.
    BatchReference:
      properties:
        from:
          type: string
          format: uri
          description: Long-form beacon-style URI to identify the source of the cross-reference,
            including the property name. Should be in the form of `weaviate://localhost/objects/<uuid>/<className>/<propertyName>`,
            where `<className>` and `<propertyName>` must represent the cross-reference
            property of the source class to be used.
          example: weaviate://localhost/Zoo/a5d09582-4239-4702-81c9-92a6e0122bb4/hasAnimals
        to:
          type: string
          format: uri
          description: Short-form URI to point to the cross-reference. Should be in
            the form of `weaviate://localhost/<uuid>` for the example of a local cross-reference
            to an object.
          example: weaviate://localhost/97525810-a9a5-4eb0-858a-71449aeb007f
        tenant:
          type: string
          description: Name of the reference tenant.
    BatchReferenceResponse:
      allOf:
      - $ref: '#/components/schemas/BatchReference'
      - properties:
          result:
            format: object
            description: Results for this specific reference.
            properties:
              status:
                type: string
                enum:
                - SUCCESS
                - FAILED
                default: SUCCESS
              errors:
                $ref: '#/components/schemas/ErrorResponse'
    GeoCoordinates:
      properties:
        latitude:
          type: number
          format: float
          description: The latitude of the point on earth in decimal form.
        longitude:
          type: number
          format: float
          description: The longitude of the point on earth in decimal form.
    PhoneNumber:
      properties:
        input:
          type: string
          description: The raw input as the phone number is present in your raw data
            set. It will be parsed into the standardized formats if valid.
        internationalFormatted:
          type: string
          description: Read-only. Parsed result in the international format (e.g.
            `+49 123 456789`).
        defaultCountry:
          type: string
          description: Optional. The ISO 3166-1 alpha-2 country code. This is used
            to figure out the correct `countryCode` and international format if only
            a national number (e.g. `0123 4567`) is provided.
        countryCode:
          type: number
          format: uint64
          description: Read-only. The numerical country code (e.g. `49`).
        national:
          type: number
          format: uint64
          description: Read-only. The numerical representation of the national part.
        nationalFormatted:
          type: string
          description: Read-only. Parsed result in the national format (e.g. `0123
            456789`).
        valid:
          type: boolean
          description: Read-only. Indicates whether the parsed number is a valid phone
            number.
    Object:
      type: object
      properties:
        class:
          type: string
          description: Name of the collection (class) the object belongs to.
        vectorWeights:
          $ref: '#/components/schemas/VectorWeights'
        properties:
          $ref: '#/components/schemas/PropertySchema'
        id:
          type: string
          format: uuid
          description: The UUID of the object.
        creationTimeUnix:
          type: integer
          format: int64
          description: (Response only) Timestamp of creation of this object in milliseconds
            since epoch UTC.
        lastUpdateTimeUnix:
          type: integer
          format: int64
          description: (Response only) Timestamp of the last object update in milliseconds
            since epoch UTC.
        vector:
          $ref: '#/components/schemas/C11yVector'
        vectors:
          $ref: '#/components/schemas/Vectors'
        tenant:
          type: string
          description: The name of the tenant the object belongs to.
        additional:
          $ref: '#/components/schemas/AdditionalProperties'
    ObjectsGetResponse:
      allOf:
      - $ref: '#/components/schemas/Object'
      - properties:
          deprecations:
            type: array
            items:
              $ref: '#/components/schemas/Deprecation'
      - properties:
          result:
            format: object
            description: Results for this specific object.
            properties:
              status:
                type: string
                enum:
                - SUCCESS
                - FAILED
                default: SUCCESS
              errors:
                $ref: '#/components/schemas/ErrorResponse'
    BatchDelete:
      type: object
      properties:
        match:
          type: object
          description: Outlines how to find the objects to be deleted.
          properties:
            class:
              type: string
              description: The name of the collection (class) from which to delete
                objects.
              example: City
            where:
              $ref: '#/components/schemas/WhereFilter'
        output:
          type: string
          description: 'Controls the verbosity of the output, possible values are:
            `minimal`, `verbose`. Defaults to `minimal`.'
          default: minimal
        deletionTimeUnixMilli:
          type: integer
          format: int64
          description: Timestamp of deletion in milliseconds since epoch UTC.
        dryRun:
          type: boolean
          description: If true, the call will show which objects would be matched
            using the specified filter without deleting any objects. <br/><br/>Depending
            on the configured verbosity, you will either receive a count of affected
            objects, or a list of IDs.
          default: false
    BatchDeleteResponse:
      type: object
      description: Delete Objects response.
      properties:
        match:
          type: object
          description: Outlines how to find the objects to be deleted.
          properties:
            class:
              type: string
              description: The name of the collection (class) from which to delete
                objects.
              example: City
            where:
              $ref: '#/components/schemas/WhereFilter'
        output:
          type: string
          description: 'Controls the verbosity of the output, possible values are:
            `minimal`, `verbose`. Defaults to `minimal`.'
          default: minimal
        deletionTimeUnixMilli:
          type: integer
          format: int64
          description: Timestamp of deletion in milliseconds since epoch UTC.
        dryRun:
          type: boolean
          description: If true, objects will not be deleted yet, but merely listed.
            Defaults to false.
          default: false
        results:
          type: object
          properties:
            matches:
              type: number
              format: int64
              description: How many objects were matched by the filter.
            limit:
              type: number
              format: int64
              description: The most amount of objects that can be deleted in a single
                query, equals [`QUERY_MAXIMUM_RESULTS`](https://docs.weaviate.io/deploy/configuration/env-vars#QUERY_MAXIMUM_RESULTS).
            successful:
              type: number
              format: int64
              description: How many objects were successfully deleted in this round.
            failed:
              type: number
              format: int64
              description: How many objects should have been deleted but could not
                be deleted.
            objects:
              type: array
              description: With output set to `minimal` only objects with error occurred
                will the be described. Successfully deleted objects would be omitted.
                Output set to `verbose` will list all of the objects with their respective
                statuses.
              items:
                format: object
                description: Results for this specific Object.
                properties:
                  id:
                    type: string
                    format: uuid
                    description: The UUID of the object.
                  status:
                    type: string
                    enum:
                    - SUCCESS
                    - DRYRUN
                    - FAILED
                    default: SUCCESS
                  errors:
                    $ref: '#/components/schemas/ErrorResponse'
    ObjectsListResponse:
      type: object
      description: List of objects.
      properties:
        objects:
          type: array
          description: The actual list of objects.
          items:
            $ref: '#/components/schemas/Object'
        deprecations:
          type: array
          items:
            $ref: '#/components/schemas/Deprecation'
        totalResults:
          type: integer
          format: int64
          description: The total number of objects for the query. The number of items
            in a response may be smaller due to paging.
    Classification:
      type: object
      description: Manage classifications, trigger them and view status of past classifications.
      properties:
        id:
          type: string
          format: uuid
          description: ID to uniquely identify this classification run.
          example: ee722219-b8ec-4db1-8f8d-5150bb1a9e0c
        class:
          type: string
          description: The name of the collection (class) which is used in this classification.
          example: City
        classifyProperties:
          type: array
          description: Which ref-property to set as part of the classification.
          example:
          - inCountry
          items:
            type: string
        basedOnProperties:
          type: array
          description: Base the text-based classification on these fields (of type
            text).
          example:
          - description
          items:
            type: string
        status:
          type: string
          description: Status of this classification.
          enum:
          - running
          - completed
          - failed
          example: running
        meta:
          $ref: '#/components/schemas/ClassificationMeta'
        type:
          type: string
          description: Which algorithm to use for classifications.
        settings:
          type: object
          description: Classification-type specific settings.
        error:
          type: string
          description: Error message if status == failed.
          default: ''
          example: 'classify xzy: something went wrong'
        filters:
          type: object
          properties:
            sourceWhere:
              $ref: '#/components/schemas/WhereFilter'
            trainingSetWhere:
              $ref: '#/components/schemas/WhereFilter'
            targetWhere:
              $ref: '#/components/schemas/WhereFilter'
    ClassificationMeta:
      type: object
      description: Additional information to a specific classification.
      properties:
        started:
          type: string
          format: date-time
          description: Time when this classification was started.
          example: '2017-07-21T17:32:28Z'
        completed:
          type: string
          format: date-time
          description: Time when this classification finished.
          example: '2017-07-21T17:32:28Z'
        count:
          type: integer
          description: Number of objects which were taken into consideration for classification.
          example: 147
        countSucceeded:
          type: integer
          description: Number of objects successfully classified.
          example: 140
        countFailed:
          type: integer
          description: Number of objects which could not be classified - see error
            message for details.
          example: 7
    WhereFilter:
      type: object
      description: Filter search results using a where filter.
      properties:
        operands:
          type: array
          description: Combine multiple where filters, requires 'And' or 'Or' operator.
          items:
            $ref: '#/components/schemas/WhereFilter'
        operator:
          type: string
          description: Operator to use.
          enum:
          - And
          - Or
          - Equal
          - Like
          - NotEqual
          - GreaterThan
          - GreaterThanEqual
          - LessThan
          - LessThanEqual
          - WithinGeoRange
          - IsNull
          - ContainsAny
          - ContainsAll
          - ContainsNone
          - Not
          example: GreaterThanEqual
        path:
          type: array
          description: Path to the property currently being filtered.
          example:
          - inCity
          - city
          - name
          items:
            type: string
        valueInt:
          type: integer
          format: int64
          description: value as integer
          example: 2000
        valueNumber:
          type: number
          format: float64
          description: value as number/float
          example: 3.14
        valueBoolean:
          type: boolean
          description: value as boolean
          example: false
        valueString:
          type: string
          description: value as text (deprecated as of v1.19; alias for valueText)
          example: my search term
        valueText:
          type: string
          description: value as text
          example: my search term
        valueDate:
          type: string
          description: value as date (as string)
          example: TODO
        valueIntArray:
          type: array
          description: value as integer
          example: '[100, 200]'
          items:
            type: integer
            format: int64
        valueNumberArray:
          type: array
          description: value as number/float
          example:
          - 3.14
          items:
            type: number
            format: float64
        valueBooleanArray:
          type: array
          description: value as boolean
          example:
          - true
          - false
          items:
            type: boolean
        valueStringArray:
          type: array
          description: value as text (deprecated as of v1.19; alias for valueText)
          example:
          - my search term
          items:
            type: string
        valueTextArray:
          type: array
          description: value as text
          example:
          - my search term
          items:
            type: string
        valueDateArray:
          type: array
          description: value as date (as string)
          example: TODO
          items:
            type: string
        valueGeoRange:
          $ref: '#/components/schemas/WhereFilterGeoRange'
    WhereFilterGeoRange:
      type: object
      description: Filter within a distance of a georange.
      properties:
        geoCoordinates:
          $ref: '#/components/schemas/GeoCoordinates'
        distance:
          type: object
          properties:
            max:
              type: number
              format: float64
    Tenant:
      type: object
      description: Attributes representing a single tenant within Weaviate.
      properties:
        name:
          type: string
          description: The name of the tenant (required).
        activityStatus:
          type: string
          description: 'The activity status of the tenant, which determines if it
            is queryable and where its data is stored.<br/><br/><b>Available Statuses:</b><br/>-
            `ACTIVE`: The tenant is fully operational and ready for queries. Data
            is stored on local, hot storage.<br/>- `INACTIVE`: The tenant is not queryable.
            Data is stored locally.<br/>- `OFFLOADED`: The tenant is inactive and
            its data is stored in a remote cloud backend.<br/><br/><b>Usage Rules:</b><br/>-
            <b>On Create:</b> This field is optional and defaults to `ACTIVE`. Allowed
            values are `ACTIVE` and `INACTIVE`.<br/>- <b>On Update:</b> This field
            is required. Allowed values are `ACTIVE`, `INACTIVE`, and `OFFLOADED`.<br/><br/><b>Read-Only
            Statuses:</b><br/>The following statuses are set by the server and indicate
            a tenant is transitioning between states:<br/>- `OFFLOADING`<br/>- `ONLOADING`<br/><br/><b>Note
            on Deprecated Names:</b><br/>For backward compatibility, deprecated names
            are still accepted and are mapped to their modern equivalents: `HOT` (now
            `ACTIVE`), `COLD` (now `INACTIVE`), `FROZEN` (now `OFFLOADED`), `FREEZING`
            (now `OFFLOADING`), `UNFREEZING` (now `ONLOADING`).'
          enum:
          - ACTIVE
          - INACTIVE
          - OFFLOADED
          - OFFLOADING
          - ONLOADING
          - HOT
          - COLD
          - FROZEN
          - FREEZING
          - UNFREEZING
    Alias:
      type: object
      description: Represents the mapping between an alias name and a collection.
        An alias provides an alternative name for accessing a collection.
      properties:
        alias:
          type: string
          description: The unique name of the alias that serves as an alternative
            identifier for the collection.
        class:
          type: string
          description: The name of the collection (class) to which this alias is mapped.
    AliasResponse:
      type: object
      description: Response object containing a list of alias mappings.
      properties:
        aliases:
          type: array
          description: Array of alias objects, each containing an alias-to-collection
            mapping.
          items:
            $ref: '#/components/schemas/Alias'
    Namespace:
      type: object
      description: A cluster-level namespace used to group resources under a common
        administrative unit. Namespace names must start with a lowercase letter, contain
        only lowercase letters and digits, be 3-36 characters long, and must not be
        a reserved name.
      properties:
        name:
          type: string
          description: The unique name of the namespace.
    NamespaceListResponse:
      type: array
      description: Response object containing a list of namespaces.
      items:
        $ref: '#/components/schemas/Namespace'
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: API key authentication
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: OIDC/JWT bearer authentication
