aid: weaviate
name: Weaviate
description: >-
  Weaviate is an open-source, AI-native vector database that enables developers
  to build semantic search and AI-powered applications. It stores data as vector
  embeddings alongside structured properties, enabling lightning-fast similarity
  search using HNSW or flat indexes. Weaviate supports multi-tenancy, automatic
  vectorization via configurable modules, GraphQL and REST APIs, and enterprise
  features including authentication, authorization, backups, and replication.
