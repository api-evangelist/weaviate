  - type: Features
    data:
      - name: Vector Storage
        description: >-
          Stores data objects alongside their vector embeddings for
          high-performance similarity search using HNSW or flat indexes.
      - name: GraphQL Search API
        description: >-
          Powerful GraphQL interface for vector similarity search (nearVector,
          nearText, nearObject, nearImage), hybrid search, and filtered queries.
      - name: Automatic Vectorization
        description: >-
          Pluggable vectorizer modules (text2vec, img2vec, etc.) automatically
          generate embeddings from object properties at write time.
      - name: Multi-Tenancy
        description: >-
          Native multi-tenancy support with tenant isolation, allowing a single
          Weaviate instance to serve multiple customers with separate data.
      - name: Schema Management
        description: >-
          Flexible schema with class and property definitions, cross-references,
          vector index configuration, and property-level vectorization settings.
      - name: Backup and Restore
        description: >-
          Backup data to S3, GCS, Azure Blob Storage, or local filesystem and
          restore on demand for disaster recovery.
      - name: Authorization and RBAC
        description: >-
          Role-based access control with fine-grained permissions for collections,
          objects, and operations. Supports API key and OIDC/JWT authentication.
      - name: Kubernetes and Cloud Native
        description: >-
          Production-ready Kubernetes Helm chart with support for horizontal
          scaling, high availability, and major cloud providers.
  - type: UseCases
    data:
      - name: Semantic Search
        description: >-
          Build semantic and hybrid search applications using vector similarity
          and BM25 keyword search combined.
      - name: RAG Applications
        description: >-
          Power Retrieval Augmented Generation (RAG) pipelines by storing and
          retrieving relevant context for large language model prompts.
      - name: Multi-Modal Search
        description: >-
          Search across text, images, and other modalities using unified vector
          representations.
      - name: AI-Powered Recommendations
        description: >-
          Build recommendation engines using object similarity search to find
          related items based on vector proximity.
